<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Express REST Demo</title>
    <style>
      :root {
        --bg: #f4f6f2;
        --ink: #1f2a24;
        --accent: #1d6b4f;
        --panel: #ffffff;
        --muted: #6a7a70;
      }

      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(circle at 10% 10%, #e6efe9, #f4f6f2 60%);
        color: var(--ink);
      }

      header {
        padding: 32px 24px 0;
      }

      .wrap {
        max-width: 800px;
        margin: 0 auto;
        padding: 24px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 2.2rem;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0 0 24px;
        color: var(--muted);
      }

      .panel {
        background: var(--panel);
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 12px 30px rgba(18, 34, 24, 0.08);
      }

      form {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }

      input {
        flex: 1;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #cfd8d1;
        font-size: 1rem;
      }

      button {
        border: none;
        background: var(--accent);
        color: white;
        padding: 12px 16px;
        border-radius: 10px;
        font-size: 0.95rem;
        cursor: pointer;
      }

      button.secondary {
        background: #cedad2;
        color: #173126;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 10px;
      }

      li {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 12px 14px;
        background: #f7faf8;
        border-radius: 12px;
        border: 1px solid #e0e7e1;
      }

      .name {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .done {
        text-decoration: line-through;
        color: #7a8b82;
      }

      .api {
        margin-top: 20px;
        font-size: 0.9rem;
      }

      code {
        background: #eef3f0;
        padding: 2px 6px;
        border-radius: 6px;
      }

      @media (max-width: 640px) {
        form {
          flex-direction: column;
        }

        button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <header class="wrap">
      <h1>Express REST Demo</h1>
      <p>Simple in-memory API with create, read, update, delete.</p>
    </header>

    <main class="wrap">
      <section class="panel">
        <form id="create-form">
          <input id="item-name" type="text" placeholder="Add a new item" required />
          <button type="submit">Create</button>
        </form>

        <ul id="items"></ul>

        <div class="api">
          Try the API directly: <code>GET /api/items</code> or <code>POST /api/items</code>
        </div>
      </section>
    </main>

    <script>
      const listEl = document.getElementById('items');
      const formEl = document.getElementById('create-form');
      const nameInput = document.getElementById('item-name');

      async function loadItems() {
        const res = await fetch('/api/items');
        const items = await res.json();
        listEl.innerHTML = '';
        items.forEach((item) => {
          const li = document.createElement('li');
          const label = document.createElement('span');
          label.className = 'name';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = item.done;
          checkbox.addEventListener('change', () => toggleItem(item.id, checkbox.checked));

          const text = document.createElement('span');
          text.textContent = item.name;
          if (item.done) text.classList.add('done');

          label.append(checkbox, text);

          const deleteBtn = document.createElement('button');
          deleteBtn.textContent = 'Delete';
          deleteBtn.className = 'secondary';
          deleteBtn.addEventListener('click', () => deleteItem(item.id));

          li.append(label, deleteBtn);
          listEl.appendChild(li);
        });
      }

      async function createItem(name) {
        await fetch('/api/items', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name })
        });
        await loadItems();
      }

      async function toggleItem(id, done) {
        await fetch(`/api/items/${id}`,
          {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ done })
          }
        );
        await loadItems();
      }

      async function deleteItem(id) {
        await fetch(`/api/items/${id}`, { method: 'DELETE' });
        await loadItems();
      }

      formEl.addEventListener('submit', (event) => {
        event.preventDefault();
        const name = nameInput.value.trim();
        if (!name) return;
        createItem(name);
        nameInput.value = '';
      });

      loadItems();
    </script>
  </body>
</html>
